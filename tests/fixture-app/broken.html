<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>selfmend fixture — broken (selector-mutated)</title>
  </head>
  <body>
    <main>
      <h1>selfmend fixture app</h1>

      <form id="signup-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" />

        <!--
          SAME semantic button as index.html. The PRIMARY (class-based) selector
          is mutated to model the common "selector churn" break:
            - class changed: "btn-primary" -> "btn-cta"
          The strong identity signals (data-testid="submit-btn", visible text
          "Submit", role=button, position in #signup-form, aria-label) are ALL
          unchanged, so a locator pinned to the volatile ".btn-primary" class
          breaks while the element's identity is fully recoverable — a correct,
          high-confidence heal IS possible (above the conservative 0.9 floor).
        -->
        <button
          type="submit"
          data-testid="submit-btn"
          class="btn btn-cta"
          role="button"
          aria-label="Submit the signup form"
        >
          Submit
        </button>
      </form>

      <!--
        Control element is INTENTIONALLY ABSENT here (present in index.html).
        A locator for [data-testid="control-only"] has no correct heal target;
        healing it would be a false green. This is the negative regression net.
      -->

      <p id="status" data-testid="status">idle</p>
    </main>
  </body>
</html>
